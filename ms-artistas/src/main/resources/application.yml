# ============================================================
# MS-ARTISTAS - Configuración principal 
# ============================================================
spring:
  application:
    name: ms-artistas
  profiles:
    active: dev
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        "spring.json.add.type.headers": false
    consumer:
      group-id: ms-artistas
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        "spring.json.trusted.packages": "cl.triskeledu.common.event"

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5433/artistas
    username: postgres
    password: 123

  jpa:
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    


# Esta clave secreta DEBE ser idéntica en todos los microservicios
# para que los tokens generados por ms-usuarios sean válidos en
# los demas ms.
# Para dar el valor al "secret" trasformaremos la frase clave (inventada) 
# "tokenSecretKeyRitmo2026TriskeleduSecurity" a formato Base64
jwt:
  secret: "dG9rZW5TZWNyZXRLZXlSaXRtbzIwMjZUcmlza2VsZWR1U2VjdXJpdHk="
  expiration-ms: 3600000
  # Para que el token sea válido por 1 hora (3600000 ms)

server:
  port: 0
  error:
    include-stacktrace: never

# Configuración de SpringDoc/Swagger UI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true
    hostname: localhost
    instance-id: "${spring.application.name}:${random.value}"
    lease-renewal-interval-in-seconds: 15
    lease-expiration-duration-in-seconds: 60

management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

info:
  app:
    name: ${spring.application.name}
    version: "@project.version@"
    description: "Microservicio de artistas para RitmoTicket"

# ════════════════════════════════════════════════════════════
# PERFIL: Desarrollo
# ════════════════════════════════════════════════════════════
---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

# MOVIDO AQUÍ PARA ASEGURAR QUE SE ACTIVE EN DEV
logging:
  level:
    root: INFO
    cl.triskeledu: DEBUG                   # <--- Esto activa TODO tu código
    org.springframework.kafka: INFO
    org.apache.kafka.clients: WARN
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,loggers

# ════════════════════════════════════════════════════════════
# PERFIL: Producción
# ════════════════════════════════════════════════════════════
---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    root: INFO
    cl.triskeledu: INFO

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka-server:8761/eureka}